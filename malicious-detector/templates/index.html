<!DOCTYPE html>
<html>
<head>
    <title>Malicious Pattern Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
    <h2>Malicious Pattern Detector</h2>

    <div class="mb-3">
        <label class="form-label">Select Input Type</label>
        <select id="type" class="form-select">
          <option value="file">File Name</option>
          <option value="domain">Domain</option>
          <option value="email">Email</option>
          <option value="username">Username</option>
          <option value="mobile">Mobile</option>
          <option value="payload">Payload / Command</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Enter Value</label>
        <input type="text" id="inputField" class="form-control" placeholder="Enter input">
    </div>

    <button onclick="check()">Check</button>

    <div id="result"></div>

    <div class="progress mt-3">
        <div id="progressBar" class="progress-bar" role="progressbar" style="width:0%">0%</div>
    </div>

    <div id="rules"></div>
</div>

<script>
function updatePlaceholder() {
    const type = document.getElementById("type").value;
    const inputField = document.getElementById("inputField");

    const placeholders = {
        file: "invoice_2026.pdf.exe",
        domain: "secure-login-update.xyz",
        email: "paypal-support2026@gmail.com",
        username: "official_admin_777",
        mobile: "0000012345",
        payload: "powershell -enc <base64> ; curl http://x.x.x.x"
    };

    inputField.placeholder = placeholders[type] || "Enter input";
}

function check() {
    const type = document.getElementById("type").value;
    const input = document.getElementById("inputField").value;

    fetch("/check", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({type: type, input: input})
    })
    .then(res => res.json())
    .then(data => {
        const score = data.score;
        const status = data.status;

        // Update result
        document.getElementById("result").innerHTML =
            `<h4>Status: ${status}</h4><p>Score: ${score}%</p>`;

        // Update progress bar
        const progressBar = document.getElementById("progressBar");
        progressBar.style.width = score + "%";
        progressBar.innerText = score + "%";

        if(status === "Normal") progressBar.className = "progress-bar bg-success";
        else if(status === "Suspicious") progressBar.className = "progress-bar bg-warning";
        else progressBar.className = "progress-bar bg-danger";

        // Display triggered rules
        const rulesDiv = document.getElementById("rules");
        rulesDiv.innerHTML = "";
        const rules = data.rules.split(",");
        rules.forEach(rule => {
            const tag = document.createElement("div");
            tag.className = "rule-tag";
            tag.innerText = rule.trim();
            rulesDiv.appendChild(tag);
        });
    });
}

document.getElementById("type").addEventListener("change", updatePlaceholder);
updatePlaceholder();
</script>

</body>
</html>
